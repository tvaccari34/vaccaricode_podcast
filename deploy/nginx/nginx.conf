worker_processes auto;
events { worker_connections 1024; }
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  server_tokens off;
  gzip on;
  gzip_types text/css application/javascript application/xml application/rss+xml image/svg+xml text/plain application/json;
  # Docker embedded DNS so upstreams resolve at request time (services may start after nginx).
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;

    # Narration job API for the home GPU worker: https://tiagovaccari.com/api/... -> narration-api
    location /api/ {
      set $api_up http://boosternews_narration-api:8090;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $api_up;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      client_max_body_size 200m;   # audio uploads
    }

    # Episode audio from object storage: /audio/<key> -> minio bucket boosternews-audio/<key>
    location /audio/ {
      set $minio_up http://minio_minio:9000;
      rewrite ^/audio/(.*)$ /boosternews-audio/$1 break;
      proxy_pass $minio_up;
      proxy_set_header Host $host;
    }

    # Static Astro site (blog, podcast, feeds).
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
