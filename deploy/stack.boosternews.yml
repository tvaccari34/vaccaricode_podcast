# boosternews — Swarm stack for this VPS (Traefik + shared postgres_postgres / minio_minio).
# Deploy with env interpolated from ../.env:
#   set -a; . ./.env; set +a
#   docker stack deploy -c deploy/stack.boosternews.yml boosternews
# One-off jobs (migrate, listmonk install, site build) run via deploy/swarm-run.sh.
version: "3.8"

x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GEMINI_MODEL: ${GEMINI_MODEL}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_REGION: ${S3_REGION}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET_AUDIO: ${S3_BUCKET_AUDIO}
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
  WORKER_AUTH_TOKEN: ${WORKER_AUTH_TOKEN}
  SITE_DOMAIN: ${SITE_DOMAIN}
  PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
  DASHBOARD_USER: ${DASHBOARD_USER}
  DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
  LISTMONK_API_URL: ${LISTMONK_API_URL}
  LISTMONK_API_USER: ${LISTMONK_API_USER}
  LISTMONK_API_TOKEN: ${LISTMONK_API_TOKEN}
  LISTMONK_LIST_ID: ${LISTMONK_LIST_ID}
  LISTMONK_LIST_ID_EN: ${LISTMONK_LIST_ID_EN}
  VOICE_ID: ${VOICE_ID}
  # Scheduler intervals (minutes; 0 disables). Generate is off unless set — it costs LLM calls.
  SCHED_TICK_SECONDS: ${SCHED_TICK_SECONDS:-30}
  SCHED_INGEST_MINUTES: ${SCHED_INGEST_MINUTES:-60}
  SCHED_EXTRACT_MINUTES: ${SCHED_EXTRACT_MINUTES:-30}
  SCHED_GENERATE_MINUTES: ${SCHED_GENERATE_MINUTES:-0}
  SCHED_PUBLISH_MINUTES: ${SCHED_PUBLISH_MINUTES:-15}
  # Narration backend (TTS provider)
  NARRATION_PROVIDER: ${NARRATION_PROVIDER:-local}
  NARRATION_SECONDARY_ENABLED: ${NARRATION_SECONDARY_ENABLED:-false}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
  ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
  ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
  ELEVENLABS_VOICE_ID_EN: ${ELEVENLABS_VOICE_ID_EN:-}
  CUSTOM_TTS_URL: ${CUSTOM_TTS_URL:-}
  CUSTOM_TTS_API_KEY: ${CUSTOM_TTS_API_KEY:-}
  CUSTOM_TTS_MODEL: ${CUSTOM_TTS_MODEL:-}
  CUSTOM_TTS_VOICE: ${CUSTOM_TTS_VOICE:-}
  CUSTOM_TTS_VOICE_EN: ${CUSTOM_TTS_VOICE_EN:-}
  CUSTOM_TTS_FORMAT: ${CUSTOM_TTS_FORMAT:-generic}

services:
  web:
    image: nginx:alpine
    networks: [BoosterBot_Network]
    volumes:
      - /root/vaccaricode_podcast/web/dist:/usr/share/nginx/html:ro
      - /root/vaccaricode_podcast/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=BoosterBot_Network
        - traefik.http.services.bn-web.loadbalancer.server.port=80
        # Apex site
        - traefik.http.routers.bn-web.rule=Host(`tiagovaccari.com`)
        - traefik.http.routers.bn-web.entrypoints=websecure
        - traefik.http.routers.bn-web.tls=true
        - traefik.http.routers.bn-web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-web.service=bn-web
        - traefik.http.routers.bn-web.middlewares=bn-sec-headers,bn-csp
        # Security middlewares — defined here (on web), referenced by the routers below.
        - traefik.http.middlewares.bn-sec-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.bn-sec-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.bn-sec-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.bn-sec-headers.headers.frameDeny=true
        - traefik.http.middlewares.bn-sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin
        - "traefik.http.middlewares.bn-csp.headers.contentSecurityPolicy=default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; media-src 'self' https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://analytics.tiagovaccari.com; font-src 'self'; connect-src 'self' https://analytics.tiagovaccari.com; form-action 'self' https://news.tiagovaccari.com"
        - traefik.http.middlewares.bn-ratelimit.ratelimit.average=15
        - traefik.http.middlewares.bn-ratelimit.ratelimit.burst=30
        # www -> apex redirect
        - traefik.http.routers.bn-www.rule=Host(`www.tiagovaccari.com`)
        - traefik.http.routers.bn-www.entrypoints=websecure
        - traefik.http.routers.bn-www.tls=true
        - traefik.http.routers.bn-www.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-www.service=bn-web
        - traefik.http.routers.bn-www.middlewares=bn-wwwredir,bn-sec-headers
        - traefik.http.middlewares.bn-wwwredir.redirectregex.regex=^https?://www\.(.*)
        - traefik.http.middlewares.bn-wwwredir.redirectregex.replacement=https://$${1}
        - traefik.http.middlewares.bn-wwwredir.redirectregex.permanent=true

  listmonk:
    image: listmonk/listmonk:latest
    command: ["./listmonk", "--config", "/listmonk/config.toml"]
    networks: [BoosterBot_Network]
    volumes:
      - /root/vaccaricode_podcast/deploy/listmonk/config.toml:/listmonk/config.toml:ro
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__root_url: ${LISTMONK_ROOT_URL}
      LISTMONK_db__host: postgres_postgres
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: boosternews
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=BoosterBot_Network
        - traefik.http.services.bn-listmonk.loadbalancer.server.port=9000
        - traefik.http.routers.bn-listmonk.rule=Host(`news.tiagovaccari.com`)
        - traefik.http.routers.bn-listmonk.entrypoints=websecure
        - traefik.http.routers.bn-listmonk.tls=true
        - traefik.http.routers.bn-listmonk.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-listmonk.service=bn-listmonk
        - traefik.http.routers.bn-listmonk.middlewares=bn-sec-headers
        # Admin + admin API behind Basic Auth; public subscribe pages and /api/public (captcha) stay open.
        - "traefik.http.routers.bn-listmonk-admin.rule=Host(`news.tiagovaccari.com`) && (PathPrefix(`/admin`) || PathPrefix(`/api`)) && !PathPrefix(`/api/public`)"
        - traefik.http.routers.bn-listmonk-admin.entrypoints=websecure
        - traefik.http.routers.bn-listmonk-admin.tls=true
        - traefik.http.routers.bn-listmonk-admin.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-listmonk-admin.service=bn-listmonk
        - traefik.http.routers.bn-listmonk-admin.priority=100
        - traefik.http.routers.bn-listmonk-admin.middlewares=bn-lm-auth,bn-sec-headers
        - traefik.http.middlewares.bn-lm-auth.basicauth.users=${LISTMONK_ADMIN_BASICAUTH}

  # Umami — privacy-friendly, cookieless site analytics (reuses shared Postgres, own `umami` DB).
  # NOTE: no Basic Auth — the tracker (/script.js) and ingest (/api/send) MUST stay public;
  # Umami's own login guards the dashboard.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    networks: [BoosterBot_Network]
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: ${UMAMI_DATABASE_URL}
      APP_SECRET: ${UMAMI_APP_SECRET}
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=BoosterBot_Network
        - traefik.http.services.bn-umami.loadbalancer.server.port=3000
        - traefik.http.routers.bn-umami.rule=Host(`analytics.tiagovaccari.com`)
        - traefik.http.routers.bn-umami.entrypoints=websecure
        - traefik.http.routers.bn-umami.tls=true
        - traefik.http.routers.bn-umami.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-umami.service=bn-umami
        - traefik.http.routers.bn-umami.middlewares=bn-sec-headers

  narration-api:
    image: boosternews/pipeline:local
    command: ["uvicorn", "boosternews.narration.app:app", "--host", "0.0.0.0", "--port", "8090"]
    environment: *app-env
    networks: [BoosterBot_Network]
    deploy:
      replicas: 1

  scheduler:
    image: boosternews/pipeline:local
    command: ["python", "-m", "boosternews.scheduler"]
    environment: *app-env
    networks: [BoosterBot_Network]
    deploy:
      replicas: 1

  dashboard:
    image: boosternews/pipeline:local
    command: ["uvicorn", "boosternews.dashboard.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment: *app-env
    networks: [BoosterBot_Network]
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=BoosterBot_Network
        - traefik.http.services.bn-dashboard.loadbalancer.server.port=8080
        - traefik.http.routers.bn-dashboard.rule=Host(`dashboard.tiagovaccari.com`)
        - traefik.http.routers.bn-dashboard.entrypoints=websecure
        - traefik.http.routers.bn-dashboard.tls=true
        - traefik.http.routers.bn-dashboard.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bn-dashboard.service=bn-dashboard
        - traefik.http.routers.bn-dashboard.middlewares=bn-sec-headers,bn-csp,bn-ratelimit

networks:
  BoosterBot_Network:
    external: true
